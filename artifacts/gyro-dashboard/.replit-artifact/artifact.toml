kind = "web"
previewPath = "/"
title = "Gyroscope Monitor"
version = "1.0.0"
id = "artifacts/gyro-dashboard"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21211

[services.development]
run = "pnpm --filter @workspace/gyro-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gyro-dashboard", "run", "build" ]
serve = "static"
publicDir = "artifacts/gyro-dashboard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21211"
BASE_PATH = "/"
