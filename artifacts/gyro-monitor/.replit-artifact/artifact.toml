kind = "web"
previewPath = "/"
title = "Gyro Monitor Dashboard"
version = "1.0.0"
id = "artifacts/gyro-monitor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25866

[services.development]
run = "pnpm --filter @workspace/gyro-monitor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gyro-monitor", "run", "build" ]
publicDir = "artifacts/gyro-monitor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25866"
BASE_PATH = "/"
